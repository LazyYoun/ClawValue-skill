<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 龙虾能力估值</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 15px;
        }
        
        /* 紧凑容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 顶部标题栏 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 15px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo {
            font-size: 1.8rem;
        }
        
        .header-title {
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .header-subtitle {
            font-size: 0.75rem;
            color: #888;
        }
        
        /* 主网格布局 - 紧凑版 */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto auto auto;
            gap: 12px;
        }
        
        /* 卡片基础样式 */
        .card {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .card-title {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .card-value {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .card-sub {
            font-size: 0.7rem;
            color: #666;
            margin-top: 4px;
        }
        
        /* 等级卡片 - 跨两列 */
        .level-card {
            grid-column: span 1;
        }
        
        .level-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            font-weight: 600;
        }
        
        .level-progress {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }
        
        .level-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s ease;
        }
        
        /* 龙虾图片生成区 - 醒目 */
        .generate-card {
            grid-column: span 1;
            background: linear-gradient(135deg, rgba(255,107,107,0.1), rgba(255,142,83,0.1));
            border: 1px solid rgba(255,107,107,0.2);
        }
        
        .generate-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255,107,107,0.3);
        }
        
        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* 调侃话术 */
        .roast-card {
            grid-column: span 2;
        }
        
        .roast-text {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #ddd;
        }
        
        .roast-achievements {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .achievement-tag {
            background: rgba(254, 202, 87, 0.15);
            border: 1px solid rgba(254, 202, 87, 0.3);
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.75rem;
            color: #feca57;
        }
        
        /* 图表区域 */
        .chart-card {
            grid-column: span 1;
        }
        
        .chart-container {
            height: 150px;
        }
        
        /* 技能分布 */
        .skills-card {
            grid-column: span 1;
        }
        
        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .skill-tag {
            background: rgba(102, 126, 234, 0.15);
            border: 1px solid rgba(102, 126, 234, 0.2);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
        }
        
        .skill-tag span {
            color: #667eea;
            margin-left: 4px;
        }
        
        /* 评分详情 */
        .scores-card {
            grid-column: span 1;
        }
        
        .score-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .score-row:last-child {
            border-bottom: none;
        }
        
        .score-label {
            font-size: 0.75rem;
            color: #888;
        }
        
        .score-bar {
            width: 100px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .score-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        .score-fill.skill { background: #667eea; }
        .score-fill.auto { background: #f093fb; }
        .score-fill.integrate { background: #43e97b; }
        
        .score-value {
            font-size: 0.75rem;
            font-weight: 600;
            width: 30px;
            text-align: right;
        }
        
        /* 操作按钮 */
        .actions-card {
            grid-column: span 3;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .action-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid;
        }
        
        .btn-refresh {
            background: rgba(67, 233, 123, 0.15);
            border-color: rgba(67, 233, 123, 0.3);
            color: #43e97b;
        }
        
        .btn-export {
            background: rgba(102, 126, 234, 0.15);
            border-color: rgba(102, 126, 234, 0.3);
            color: #667eea;
        }
        
        .btn-share {
            background: rgba(240, 147, 251, 0.15);
            border-color: rgba(240, 147, 251, 0.3);
            color: #f093fb;
        }
        
        .btn-theme {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #aaa;
        }
        
        .action-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.2);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        /* 图片弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 20px;
        }
        
        .modal-content {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 20px;
            max-width: 90vw;
            max-height: 90vh;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
        }
        
        .modal-content img {
            max-width: 100%;
            max-height: 60vh;
            border-radius: 10px;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .modal-btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
        }
        
        .modal-btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: white;
            border: none;
        }
        
        .modal-btn-secondary {
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            color: #667eea;
        }
        
        /* 响应式 */
        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr 1fr;
            }
            .roast-card, .actions-card {
                grid-column: span 2;
            }
            .chart-card, .skills-card, .scores-card {
                grid-column: span 1;
            }
        }
        
        @media (max-width: 600px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            .level-card, .generate-card, .roast-card, .chart-card, .skills-card, .scores-card, .actions-card {
                grid-column: span 1;
            }
            .card-value {
                font-size: 1.5rem;
            }
        }
        
        /* 浅色主题 */
        body.light-theme {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8eb 100%);
            color: #333;
        }
        
        body.light-theme .card {
            background: rgba(255,255,255,0.8);
            border-color: rgba(0,0,0,0.05);
        }
        
        body.light-theme .header {
            background: rgba(255,255,255,0.9);
        }
        
        body.light-theme .card-title,
        body.light-theme .score-label,
        body.light-theme .header-subtitle {
            color: #666;
        }
        
        body.light-theme .roast-text {
            color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部标题栏 -->
        <div class="header">
            <div class="header-left">
                <span class="logo">🦞</span>
                <div>
                    <div class="header-title">龙虾能力估值</div>
                    <div class="header-subtitle">OpenClaw 使用深度评估</div>
                </div>
            </div>
            <div style="font-size: 0.75rem; color: #666;" id="update-time">加载中...</div>
        </div>
        
        <!-- 主内容网格 -->
        <div class="main-grid">
            <!-- 等级卡片 -->
            <div class="card level-card">
                <div class="card-title">📊 使用深度</div>
                <div class="level-badge" id="level-badge">
                    <span id="level-emoji">🎮</span>
                    <span>Lv.<span id="level-num">2</span></span>
                    <span id="level-name">初级玩家</span>
                </div>
                <div class="level-progress">
                    <div class="level-progress-bar" id="level-progress" style="width: 40%"></div>
                </div>
            </div>
            
            <!-- 价值估算 -->
            <div class="card">
                <div class="card-title">💰 价值估算</div>
                <div class="card-value">¥<span id="value-amount">2,000</span></div>
                <div class="card-sub">预估年度节省成本</div>
            </div>
            
            <!-- 技能统计 -->
            <div class="card">
                <div class="card-title">🛠️ 技能统计</div>
                <div class="card-value"><span id="skill-count">8</span> 个</div>
                <div class="card-sub"><span id="custom-count">8</span> 个自定义</div>
            </div>
            
            <!-- 龙虾图片生成 - 醒目 -->
            <div class="card generate-card">
                <div class="card-title">🎨 生成专属龙虾</div>
                <button class="generate-btn" id="generate-btn" onclick="generateLobsterImage()">
                    ✨ 生成我的龙虾形象
                </button>
                <div class="card-sub" style="margin-top: 8px; text-align: center;">AI 根据你的等级生成独特龙虾</div>
            </div>
            
            <!-- 调侃话术 -->
            <div class="card roast-card">
                <div class="card-title">🔥 龙虾点评</div>
                <div class="roast-text" id="roast-text">加载中...</div>
                <div class="roast-achievements" id="achievements"></div>
            </div>
            
            <!-- 评分详情 -->
            <div class="card scores-card">
                <div class="card-title">🎯 能力评分</div>
                <div class="score-row">
                    <span class="score-label">🛠️ 技能</span>
                    <div class="score-bar"><div class="score-fill skill" id="score-skill" style="width: 70%"></div></div>
                    <span class="score-value" id="score-skill-val">70</span>
                </div>
                <div class="score-row">
                    <span class="score-label">⚡ 自动化</span>
                    <div class="score-bar"><div class="score-fill auto" id="score-auto" style="width: 20%"></div></div>
                    <span class="score-value" id="score-auto-val">20</span>
                </div>
                <div class="score-row">
                    <span class="score-label">🔗 集成</span>
                    <div class="score-bar"><div class="score-fill integrate" id="score-int" style="width: 30%"></div></div>
                    <span class="score-value" id="score-int-val">30</span>
                </div>
            </div>
            
            <!-- 图表 -->
            <div class="card chart-card">
                <div class="card-title">📈 使用趋势</div>
                <div class="chart-container">
                    <canvas id="trend-chart"></canvas>
                </div>
            </div>
            
            <!-- 技能分布 -->
            <div class="card skills-card">
                <div class="card-title">🏷️ 技能分类</div>
                <div class="skill-tags" id="skill-tags">
                    <span class="skill-tag">加载中...</span>
                </div>
            </div>
            
            <!-- 操作按钮 -->
            <div class="card actions-card">
                <button class="action-btn btn-refresh" onclick="refreshData()">🔄 刷新</button>
                <button class="action-btn btn-export" onclick="exportData()">📥 导出</button>
                <button class="action-btn btn-share" onclick="shareResult()">📤 分享</button>
                <button class="action-btn btn-theme" onclick="toggleTheme()">🌓 主题</button>
            </div>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <script>
        // 全局变量
        let currentLevel = 1;
        let currentAchievements = [];
        let trendChart = null;
        
        // 等级配置
        const LEVELS = {
            1: { emoji: '🐣', name: '入门小白' },
            2: { emoji: '🎮', name: '初级玩家' },
            3: { emoji: '💻', name: '中级开发者' },
            4: { emoji: '🚀', name: '高级工程师' },
            5: { emoji: '🦞', name: '龙虾大师' }
        };
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            fetchData();
            initChart();
        });
        
        // 获取数据
        async function fetchData() {
            try {
                const res = await fetch('/api/');
                const json = await res.json();
                if (json.success && json.data) {
                    updateUI(json.data);
                }
            } catch (e) {
                showToast('❌ 数据加载失败');
            }
        }
        
        // 更新界面
        function updateUI(data) {
            currentLevel = data.depth_level || 1;
            currentAchievements = data.achievements || [];
            
            // 更新等级
            const level = LEVELS[currentLevel];
            document.getElementById('level-emoji').textContent = level.emoji;
            document.getElementById('level-num').textContent = currentLevel;
            document.getElementById('level-name').textContent = level.name;
            document.getElementById('level-progress').style.width = `${currentLevel * 20}%`;
            
            // 更新价值
            document.getElementById('value-amount').textContent = (data.value_estimation?.amount || 0).toLocaleString();
            
            // 更新技能
            document.getElementById('skill-count').textContent = data.skills?.total || 0;
            document.getElementById('custom-count').textContent = data.skills?.custom || 0;
            
            // 更新评分
            const eval = data.evaluation || {};
            document.getElementById('score-skill').style.width = `${eval.skill_score || 0}%`;
            document.getElementById('score-skill-val').textContent = eval.skill_score || 0;
            document.getElementById('score-auto').style.width = `${eval.automation_score || 0}%`;
            document.getElementById('score-auto-val').textContent = eval.automation_score || 0;
            document.getElementById('score-int').style.width = `${eval.integration_score || 0}%`;
            document.getElementById('score-int-val').textContent = eval.integration_score || 0;
            
            // 更新调侃
            document.getElementById('roast-text').textContent = eval.lobster_message || '加载中...';
            
            // 更新成就
            const achHtml = currentAchievements.map(a => 
                `<span class="achievement-tag">${a}</span>`
            ).join('');
            document.getElementById('achievements').innerHTML = achHtml;
            
            // 更新技能分类
            const tagsHtml = Object.entries(data.skills?.categories || {}).map(([name, count]) =>
                `<span class="skill-tag">${name} <span>${count}</span></span>`
            ).join('');
            document.getElementById('skill-tags').innerHTML = tagsHtml || '<span class="skill-tag">暂无</span>';
            
            // 更新图表
            if (trendChart && data.trends) {
                trendChart.data.labels = data.trends.map(t => t.date);
                trendChart.data.datasets[0].data = data.trends.map(t => t.count);
                trendChart.update();
            }
            
            // 更新时间
            document.getElementById('update-time').textContent = new Date().toLocaleTimeString();
        }
        
        // 初始化图表
        function initChart() {
            const ctx = document.getElementById('trend-chart').getContext('2d');
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#666', font: { size: 9 } }
                        },
                        y: { 
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#666', font: { size: 9 } }
                        }
                    }
                }
            });
        }
        
        // 生成龙虾图片
        async function generateLobsterImage() {
            const btn = document.getElementById('generate-btn');
            btn.disabled = true;
            btn.textContent = '🎨 生成中...';
            
            try {
                const res = await fetch('/api/generate-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        level: currentLevel,
                        achievements: currentAchievements
                    })
                });
                
                const json = await res.json();
                if (json.success) {
                    showImageModal(json.data);
                    showToast('✅ 龙虾图片生成成功！');
                } else {
                    showToast('❌ ' + (json.error || '生成失败'));
                }
            } catch (e) {
                showToast('❌ 网络错误');
            }
            
            btn.disabled = false;
            btn.textContent = '✨ 生成我的龙虾形象';
        }
        
        // 显示图片弹窗
        function showImageModal(data) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            modal.innerHTML = `
                <div class="modal-content">
                    <button class="modal-close" onclick="this.closest('.modal').remove()">×</button>
                    <div style="font-size:0.8rem;color:#888;margin-bottom:10px;">🎨 ${data.style} | Lv.${currentLevel}</div>
                    <img src="${data.image_url}" />
                    <div class="modal-actions">
                        <a href="${data.image_url}" download="my-lobster.png" class="modal-btn modal-btn-primary">📥 保存</a>
                        <button class="modal-btn modal-btn-secondary" onclick="navigator.clipboard.writeText('${data.image_url}');showToast('✅ 已复制链接')">📋 复制链接</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        // 刷新数据
        async function refreshData() {
            showToast('🔄 刷新中...');
            await fetchData();
            showToast('✅ 数据已刷新');
        }
        
        // 导出数据
        async function exportData() {
            const res = await fetch('/api/');
            const json = await res.json();
            const blob = new Blob([JSON.stringify(json, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'clawvalue-report.json';
            a.click();
            showToast('✅ 数据已导出');
        }
        
        // 分享
        async function shareResult() {
            const text = `🦞 我的OpenClaw龙虾等级 Lv.${currentLevel}！\n\n技能: ${document.getElementById('skill-count').textContent}个\n价值: ¥${document.getElementById('value-amount').textContent}\n\n来测测你的龙虾能力吧！`;
            
            if (navigator.share) {
                await navigator.share({ title: '龙虾能力估值', text });
            } else {
                await navigator.clipboard.writeText(text);
                showToast('✅ 已复制到剪贴板');
            }
        }
        
        // 切换主题
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            showToast(document.body.classList.contains('light-theme') ? '☀️ 浅色主题' : '🌙 深色主题');
        }
        
        // Toast
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        // 快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') refreshData();
            if (e.key === 's' || e.key === 'S') shareResult();
        });
    </script>
</body>
</html>
