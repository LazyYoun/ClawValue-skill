<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 龙虾能力估值 Skill v1.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
            margin-bottom: 10px;
        }

        header p {
            color: #888;
            font-size: 1rem;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .card-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        .card-subtitle {
            font-size: 0.85rem;
            color: #888;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 15px 0;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #aaa;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s ease;
        }

        /* Card specific colors */
        .card-depth .card-icon { background: linear-gradient(135deg, #667eea, #764ba2); }
        .card-depth .stat-value { color: #667eea; }
        .card-depth .progress-fill { background: linear-gradient(90deg, #667eea, #764ba2); }

        .card-value .card-icon { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .card-value .stat-value { color: #f5576c; }

        .card-skills .card-icon { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .card-skills .stat-value { color: #4facfe; }

        .card-sessions .card-icon { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .card-sessions .stat-value { color: #43e97b; }

        /* Depth levels */
        .depth-levels {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .depth-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .depth-item span:first-child {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .depth-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .depth-1 { background: #2d3436; color: #dfe6e9; }
        .depth-2 { background: #0984e3; color: #fff; }
        .depth-3 { background: #00b894; color: #fff; }
        .depth-4 { background: #fdcb6e; color: #2d3436; }
        .depth-5 { background: #e17055; color: #fff; }

        /* Roast section */
        .roast-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        .roast-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .roast-icon {
            font-size: 2rem;
        }

        .roast-title {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .roast-content {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #ff6b6b;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #feca57;
        }

        .roast-content p {
            margin-bottom: 10px;
        }

        .roast-content p:last-child {
            margin-bottom: 0;
        }

        /* Achievements section */
        .achievements-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .achievements-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #feca57;
        }

        .achievements-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .achievement-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.95rem;
            color: #e0e0e0;
            border-left: 3px solid #feca57;
            animation: fadeInUp 0.4s ease forwards;
        }

        .achievement-item:nth-child(1) { animation-delay: 0.1s; }
        .achievement-item:nth-child(2) { animation-delay: 0.2s; }
        .achievement-item:nth-child(3) { animation-delay: 0.3s; }

        /* Charts section */
        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-container {
            position: relative;
            height: 250px;
        }

        /* Skill tags */
        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .skill-tag {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .skill-tag .count {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .charts-section {
                grid-template-columns: 1fr;
            }

            .chart-container {
                height: 200px;
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card, .roast-section, .chart-card {
            animation: fadeInUp 0.6s ease forwards;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }

        /* 刷新按钮悬浮效果 */
        #refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        #refresh-btn:active {
            transform: translateY(0);
        }

        /* 数据更新闪烁效果 */
        @keyframes dataUpdate {
            0% { background-color: rgba(102, 126, 234, 0.3); }
            100% { background-color: transparent; }
        }

        .data-updated {
            animation: dataUpdate 0.5s ease;
        }

        /* 趣味化标题动画 */
        @keyframes lobsterWiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        header h1:hover {
            animation: lobsterWiggle 0.5s ease;
        }

        /* 成就弹出效果 */
        @keyframes achievementPop {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .achievement-item {
            animation: achievementPop 0.4s ease forwards;
        }

        .achievement-item:nth-child(1) { animation-delay: 0.1s; }
        .achievement-item:nth-child(2) { animation-delay: 0.2s; }
        .achievement-item:nth-child(3) { animation-delay: 0.3s; }
        .achievement-item:nth-child(4) { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🦞 龙虾能力估值 Skill v1.0</h1>
            <p>基于 Claude Code 使用数据的深度分析与价值评估</p>
            <button id="refresh-btn" onclick="refreshData()" style="
                margin-top: 15px;
                padding: 10px 25px;
                background: linear-gradient(135deg, #667eea, #764ba2);
                border: none;
                border-radius: 25px;
                color: white;
                font-size: 0.95rem;
                cursor: pointer;
                transition: all 0.3s ease;
                box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            ">🔄 刷新数据</button>
        </header>

        <div class="dashboard">
            <!-- 使用深度卡片 -->
            <div class="card card-depth">
                <div class="card-header">
                    <div class="card-icon">📊</div>
                    <div>
                        <div class="card-title">使用深度等级</div>
                        <div class="card-subtitle">Usage Depth Level</div>
                    </div>
                </div>
                <div class="stat-value" id="depth-level">--</div>
                <div class="stat-label" id="depth-label">正在加载...</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="depth-progress" style="width: 0%"></div>
                </div>
                <div class="depth-levels" id="depth-breakdown">
                    <!-- 动态填充 -->
                </div>
            </div>

            <!-- 价值估算卡片 -->
            <div class="card card-value">
                <div class="card-header">
                    <div class="card-icon">💰</div>
                    <div>
                        <div class="card-title">价值估算</div>
                        <div class="card-subtitle">Value Estimation</div>
                    </div>
                </div>
                <div class="stat-value" id="value-amount">--</div>
                <div class="stat-label" id="value-label">正在计算...</div>
                <div style="margin-top: 15px; font-size: 0.9rem; color: #aaa;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span>节省工时</span>
                        <span id="hours-saved">--</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span>效率提升</span>
                        <span id="efficiency">--</span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span>ROI</span>
                        <span id="roi">--</span>
                    </div>
                </div>
            </div>

            <!-- 技能统计卡片 -->
            <div class="card card-skills">
                <div class="card-header">
                    <div class="card-icon">🛠️</div>
                    <div>
                        <div class="card-title">技能统计</div>
                        <div class="card-subtitle">Skill Statistics</div>
                    </div>
                </div>
                <div class="stat-value" id="skill-count">--</div>
                <div class="stat-label">已识别技能类别</div>
                <div class="skill-tags" id="skill-tags">
                    <!-- 动态填充 -->
                </div>
            </div>

            <!-- 会话统计卡片 -->
            <div class="card card-sessions">
                <div class="card-header">
                    <div class="card-icon">💬</div>
                    <div>
                        <div class="card-title">会话统计</div>
                        <div class="card-subtitle">Session Statistics</div>
                    </div>
                </div>
                <div class="stat-value" id="session-count">--</div>
                <div class="stat-label">总会话数</div>
                <div style="margin-top: 15px; font-size: 0.9rem; color: #aaa;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span>平均消息数</span>
                        <span id="avg-messages">--</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span>总消息数</span>
                        <span id="total-messages">--</span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span>活跃天数</span>
                        <span id="active-days">--</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 趣味化调侃话术展示区 -->
        <div class="roast-section">
            <div class="roast-header">
                <span class="roast-icon">🔥</span>
                <span class="roast-title">龙虾点评</span>
            </div>
            <div class="roast-content" id="roast-content">
                <p class="loading">正在分析你的龙虾等级</p>
            </div>
            <!-- 成就展示 -->
            <div class="achievements-section" id="achievements-section" style="display: none;">
                <div class="achievements-title">🏆 成就解锁</div>
                <div class="achievements-list" id="achievements-list"></div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="charts-section">
            <div class="chart-card">
                <div class="chart-title">📈 技能类别分布</div>
                <div class="chart-container">
                    <canvas id="skillChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-title">📅 使用趋势</div>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 颜色配置
        const colors = {
            primary: '#667eea',
            secondary: '#f5576c',
            success: '#43e97b',
            warning: '#feca57',
            info: '#4facfe',
            purple: '#a855f7',
            pink: '#ec4899',
            cyan: '#06b6d4',
            orange: '#f97316'
        };

        const chartColors = [
            colors.primary,
            colors.secondary,
            colors.success,
            colors.warning,
            colors.info,
            colors.purple,
            colors.pink,
            colors.cyan,
            colors.orange
        ];

        // 深度等级配置
        const depthConfig = {
            1: { label: '入门小白', emoji: '🐣', color: '#888' },
            2: { label: '初级玩家', emoji: '🎮', color: '#0984e3' },
            3: { label: '中级开发者', emoji: '💻', color: '#00b894' },
            4: { label: '高级工程师', emoji: '🚀', color: '#fdcb6e' },
            5: { label: '龙虾大师', emoji: '🦞', color: '#e17055' }
        };

        // 调侃话术模板
        const roastTemplates = {
            1: [
                "🐣 小龙虾你好！看来你刚刚踏入这个神奇的世界。别担心，每只大龙虾都是从这里开始的！",
                "你的使用深度还处于「萌新」阶段，建议多和 Claude 聊聊天，它会成为你的得力助手~",
                "目前看来你是个「轻度用户」，但这不代表什么，毕竟 Rome wasn't built in a day！"
            ],
            2: [
                "🎮 初级玩家认证！你已经开始探索更多功能了，继续保持这个势头！",
                "你的使用模式显示你是个「实用主义者」，用最少的操作完成最多的任务，聪明！",
                "已经脱离新手村了！下一步：解锁更多高级技能，成为真正的龙虾达人~"
            ],
            3: [
                "💻 中级开发者！你已经是个合格的 Claude 用户了，各种功能信手拈来~",
                "你的使用深度显示你是个「效率追求者」，懂得利用工具提升生产力！",
                "恭喜达到中级水平！你已经是团队里那个「会用 AI 的人」了！"
            ],
            4: [
                "🚀 高级工程师！你对 Claude 的使用已经炉火纯青，堪称效率机器！",
                "你的技能树已经点满大半，是时候考虑传授经验给新人了~",
                "高级玩家认证！你用 Claude 的方式，让旁观者都忍不住想学习！"
            ],
            5: [
                "🦞 龙虾大师！你已经达到了传说中的最高境界！Claude 见你都要叫一声「大佬」！",
                "你的使用深度已经突破天际！建议你直接去写一本《Claude 使用指南》！",
                "恭喜你成为「龙虾大师」！你的效率已经让普通人类望尘莫及了！"
            ]
        };

        let skillChart, trendChart;

        // 初始化图表
        function initCharts() {
            const skillCtx = document.getElementById('skillChart').getContext('2d');
            skillChart = new Chart(skillCtx, {
                type: 'doughnut',
                data: {
                    labels: ['加载中...'],
                    datasets: [{
                        data: [1],
                        backgroundColor: [colors.primary],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                color: '#e0e0e0',
                                padding: 15,
                                font: { size: 12 }
                            }
                        }
                    }
                }
            });

            const trendCtx = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(trendCtx, {
                type: 'line',
                data: {
                    labels: ['加载中...'],
                    datasets: [{
                        label: '使用次数',
                        data: [0],
                        borderColor: colors.primary,
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: colors.primary,
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#888' }
                        },
                        y: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#888' },
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        // 获取数据并更新UI
        async function fetchData() {
            try {
                const response = await fetch('/api/');
                const data = await response.json();
                updateUI(data);
            } catch (error) {
                console.error('获取数据失败:', error);
                showError();
            }
        }

        // 更新UI
        function updateUI(data) {
            // 更新深度等级
            const depth = data.depth_level || 1;
            const depthInfo = depthConfig[depth];
            document.getElementById('depth-level').textContent = `${depthInfo.emoji} Lv.${depth}`;
            document.getElementById('depth-label').textContent = depthInfo.label;
            document.getElementById('depth-progress').style.width = `${depth * 20}%`;

            // 更新深度分布
            if (data.depth_breakdown) {
                const breakdownHtml = data.depth_breakdown.map(item => `
                    <div class="depth-item">
                        <span>
                            <span class="depth-badge depth-${item.level}">Lv.${item.level}</span>
                            ${item.name}
                        </span>
                        <span>${item.count} 次</span>
                    </div>
                `).join('');
                document.getElementById('depth-breakdown').innerHTML = breakdownHtml;
            }

            // 更新价值估算
            const value = data.value_estimation || {};
            document.getElementById('value-amount').textContent = `¥${(value.amount || 0).toLocaleString()}`;
            document.getElementById('value-label').textContent = value.description || '预估节省成本';
            document.getElementById('hours-saved').textContent = `${value.hours_saved || 0} 小时`;
            document.getElementById('efficiency').textContent = `+${value.efficiency || 0}%`;
            document.getElementById('roi').textContent = value.roi || '--';

            // 更新技能统计
            const skills = data.skills || {};
            document.getElementById('skill-count').textContent = Object.keys(skills.categories || {}).length;
            
            const tagsHtml = Object.entries(skills.categories || {}).map(([name, count]) => `
                <div class="skill-tag">
                    ${name}
                    <span class="count">${count}</span>
                </div>
            `).join('');
            document.getElementById('skill-tags').innerHTML = tagsHtml;

            // 更新会话统计
            const sessions = data.sessions || {};
            document.getElementById('session-count').textContent = sessions.total || 0;
            document.getElementById('avg-messages').textContent = sessions.avg_messages || 0;
            document.getElementById('total-messages').textContent = sessions.total_messages || 0;
            document.getElementById('active-days').textContent = `${sessions.active_days || 0} 天`;

            // 更新调侃话术
            const roasts = roastTemplates[depth] || roastTemplates[1];
            const randomRoast = roasts[Math.floor(Math.random() * roasts.length)];
            document.getElementById('roast-content').innerHTML = `<p>${randomRoast}</p>`;

            // 更新成就
            const achievements = data.evaluation?.achievements || [];
            const achievementsSection = document.getElementById('achievements-section');
            const achievementsList = document.getElementById('achievements-list');
            
            if (achievements.length > 0) {
                achievementsSection.style.display = 'block';
                achievementsList.innerHTML = achievements.map(a => 
                    `<div class="achievement-item">${a}</div>`
                ).join('');
            } else {
                achievementsSection.style.display = 'none';
            }

            // 更新图表
            updateCharts(data);
        }

        // 更新图表
        function updateCharts(data) {
            // 技能分布图
            const categories = data.skills?.categories || {};
            const skillLabels = Object.keys(categories);
            const skillData = Object.values(categories);

            if (skillLabels.length > 0) {
                skillChart.data.labels = skillLabels;
                skillChart.data.datasets[0].data = skillData;
                skillChart.data.datasets[0].backgroundColor = chartColors.slice(0, skillLabels.length);
                skillChart.update();
            }

            // 使用趋势图
            const trends = data.trends || [];
            if (trends.length > 0) {
                trendChart.data.labels = trends.map(t => t.date);
                trendChart.data.datasets[0].data = trends.map(t => t.count);
                trendChart.update();
            }
        }

        // 显示错误
        function showError() {
            document.getElementById('roast-content').innerHTML = '<p>⚠️ 数据加载失败，请检查 API 连接</p>';
        }

        // 刷新数据
        async function refreshData() {
            const btn = document.getElementById('refresh-btn');
            btn.disabled = true;
            btn.textContent = '⏳ 刷新中...';
            btn.style.opacity = '0.7';

            try {
                const response = await fetch('/api/refresh', { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    // 重新获取仪表盘数据
                    await fetchData();
                    btn.textContent = '✅ 已刷新';
                    setTimeout(() => {
                        btn.textContent = '🔄 刷新数据';
                        btn.disabled = false;
                        btn.style.opacity = '1';
                    }, 2000);
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                console.error('刷新失败:', error);
                btn.textContent = '❌ 刷新失败';
                setTimeout(() => {
                    btn.textContent = '🔄 刷新数据';
                    btn.disabled = false;
                    btn.style.opacity = '1';
                }, 2000);
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            fetchData();
        });
    </script>
</body>
</html>
